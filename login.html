<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f4f0;
    padding: 2rem;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border: 0.5px solid #dddbd3;
    border-radius: 20px;
    padding: 2.5rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #D4537E, #AFA9EC, #5DCAA5);
  }

  .brand-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .brand-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: #FBEAF0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-icon i {
    font-size: 18px;
    color: #993556;
  }

  .brand-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: 0.03em;
    display: block;
  }

  .brand-sub {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: #888780;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
    margin-top: -2px;
  }

  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: #1a1a1a;
    margin-bottom: 0.25rem;
    letter-spacing: 0.01em;
  }

  .login-subtitle {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: #888780;
    letter-spacing: 0.08em;
    margin-bottom: 2rem;
  }

  .field-group {
    margin-bottom: 1.25rem;
  }

  .field-label {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888780;
    display: block;
    margin-bottom: 6px;
  }

  .field-input {
    width: 100%;
    background: #f5f4f0;
    border: 0.5px solid #dddbd3;
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: #1a1a1a;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }

  .field-input:focus {
    border-color: #D4537E;
    background: #ffffff;
  }

  .field-input::placeholder {
    color: #b4b2a9;
    font-weight: 300;
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: #993556;
    color: #FBEAF0;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-login:hover { background: #72243E; }
  .btn-login:active { transform: scale(0.98); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem 0 1rem;
  }

  .divider-line {
    flex: 1;
    height: 0.5px;
    background: #dddbd3;
  }

  .divider-text {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #b4b2a9;
  }

  .forgot-link {
    display: block;
    text-align: center;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: #993556;
    text-decoration: none;
    letter-spacing: 0.04em;
  }

  .forgot-link:hover { color: #D4537E; }

  .security-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-top: 1.75rem;
    padding-top: 1.25rem;
    border-top: 0.5px solid #dddbd3;
  }

  .security-note i {
    font-size: 13px;
    color: #b4b2a9;
  }

  .security-note span {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: #b4b2a9;
  }
</style>
</head>

<body>
  <div class="login-card">
    <div class="brand-mark">
      <div class="brand-icon">
        <i class="ti ti-sparkles"></i>
      </div>
      <div>
        <span class="brand-sub">Panel administrativo</span>
      </div>
    </div>

    <p class="login-title">Acceso</p>
    <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

    <div class="field-group">
      <label class="field-label" for="email">Correo electrónico</label>
      <input class="field-input" type="email" id="email" placeholder="admin@studio.com">
    </div>

    <div class="field-group">
      <label class="field-label" for="password">Contraseña</label>
      <input class="field-input" type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-login" id="btn-login">Ingresar</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">¿Problemas?</span>
      <div class="divider-line"></div>
    </div>

    <a href="#" class="forgot-link" id="forgot-link">¿Olvidaste tu contraseña?</a>

    <div class="security-note">
      <i class="ti ti-lock"></i>
      <span>Conexión cifrada y segura</span>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
